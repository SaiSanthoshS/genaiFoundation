<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Symptom Navigator — Nearby Clinics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="wrap">
  <div class="page-head">
    <div class="eyebrow"><span class="dot"></span> Step 3 of 4 — Clinic Map</div>
    <h1>Clinics near you</h1>
    <p class="sub" id="clinic-context">Loading nearby clinics…</p>
  </div>

  <div class="clinic-layout">
    <div class="clinic-list" id="clinic-list"></div>

    <div class="card map-stage reveal" style="animation-delay:0.1s">
      <div class="map-svg-wrap">
        <svg viewBox="0 0 100 100" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
          <defs>
            <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
              <path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(11,165,165,0.14)" stroke-width="0.6"/>
            </pattern>
          </defs>
          <rect width="100" height="100" fill="url(#grid)"/>
          <path d="M0 20 H100 M0 50 H100 M0 78 H100" stroke="rgba(15,33,56,0.08)" stroke-width="1.4"/>
          <path d="M25 0 V100 M62 0 V100" stroke="rgba(15,33,56,0.08)" stroke-width="1.4"/>
          <circle cx="50" cy="50" r="4" fill="var(--coral)" stroke="white" stroke-width="1"/>
          <text x="50" y="46" font-size="3.4" text-anchor="middle" fill="var(--ink)" font-family="Inter, sans-serif" font-weight="700">You</text>
          <g id="map-pins"></g>
        </svg>
      </div>
      <p style="font-size:0.78rem; color:var(--ink-soft); margin-top:12px; text-align:center;">Stylized map for illustration — tap a pin or a clinic card to match them up.</p>
    </div>
  </div>

  <div class="results-actions">
    <a class="btn btn-primary" href="report.html">Download Report</a>
    <a class="btn btn-ghost" href="results.html">Back to Conditions</a>
  </div>
</main>

<div id="site-footer"></div>

<script src="js/data.js"></script>
<script src="js/agent.js"></script>
<script src="js/app.js"></script>
<script>
  renderHeader(2);
  renderFooter();
  initClinicsPage();
</script>
</body>
</html>
